version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: todo_api_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kamalesh
      POSTGRES_PASSWORD: kamalesh2004
      POSTGRES_DB: todo_api
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kamalesh -d todo_api"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - todo_network

  # Go TODO API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo_api
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      DATABASE_URI: postgresql://kamalesh:kamalesh2004@postgres:5432/todo_api?sslmode=disable
      PORT: "9090"
      JWT_SECRET: your-secret-key-here-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - todo_network

volumes:
  postgres_data:
    driver: local

networks:
  todo_network:
    driver: bridge
